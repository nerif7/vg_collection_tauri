<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https://en.cf-vanguard.com data:; connect-src 'self' https://raw.githubusercontent.com https://api.github.com; style-src 'self' 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VG Collection — Tauri POC</title>
</head>
<body>
  <div class="app">
    <header>
      <h1>🃏 VG Collection — Tauri POC</h1>
      <p class="subtitle">
        Virtualized list rendering untuk <code>24k+</code> kartu.
      </p>
    </header>

    <div class="actions">
      <button id="loadBtn" type="button">Load Cards</button>
      <button id="refreshBtn" type="button" class="btn-secondary">Force Refresh</button>
      <button id="clearBtn" type="button" class="btn-danger">Clear Cache</button>
    </div>

    <div id="status" class="status status-info"></div>

    <div id="cacheInfo" class="cache-info"></div>

    <div id="stats" class="stats"></div>

    <div class="list-section">
      <div class="list-header">
        <h3>Browse Cards</h3>
        <span id="listMeta" class="list-meta">— kartu</span>
      </div>
      <div id="cardListContainer" class="card-list-container"></div>
    </div>

    <div class="note">
      <strong>Virtualization:</strong> Hanya render rows yang visible di viewport (+ buffer 8). Total 24k+ cards, tapi DOM cuma ~20 elements pada saat scroll. Smooth & efficient.
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
