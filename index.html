<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https://en.cf-vanguard.com data:; connect-src 'self' https://raw.githubusercontent.com https://api.github.com; style-src 'self' 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VG Collection — Tauri POC</title>
</head>
<body>
  <div class="app">
    <header>
      <h1>🃏 VG Collection — Tauri POC</h1>
      <p class="subtitle">
        Search + filter + virtualized list untuk <code>24k+</code> kartu.
      </p>
    </header>

    <div class="actions">
      <button id="loadBtn" type="button">Load Cards</button>
      <button id="refreshBtn" type="button" class="btn-secondary">Force Refresh</button>
      <button id="clearBtn" type="button" class="btn-danger">Clear Cache</button>
    </div>

    <div id="status" class="status status-info"></div>

    <div id="cacheInfo" class="cache-info"></div>

    <div id="stats" class="stats"></div>

    <div class="list-section">
      <div class="list-header">
        <h3>Browse Cards</h3>
        <div id="listMeta" class="list-meta">— kartu</div>
      </div>

      <div id="filterBar" class="filter-bar">
        <input
          type="search"
          id="searchInput"
          placeholder="🔍 Cari nama, kode, race, clan, nation..."
          autocomplete="off"
        >
        <select id="setFilter">
          <option value="all">Semua set</option>
        </select>
        <select id="nationFilter">
          <option value="all">Semua nation</option>
        </select>
        <select id="unitTypeFilter">
          <option value="all">Semua tipe</option>
        </select>
        <select id="triggerFilter">
          <option value="all">Semua trigger</option>
        </select>
        <button id="clearFiltersBtn" type="button" class="btn-clear-filters" title="Reset semua filter">
          ✕ Clear
        </button>
      </div>

      <div id="cardListContainer" class="card-list-container"></div>
    </div>

    <div class="note">
      <strong>Performance:</strong> Filter di-apply ke 24k cards via <code>Array.filter</code>, lalu virtualized list render hanya rows yang visible. Total response time biasanya &lt;20 ms.
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
