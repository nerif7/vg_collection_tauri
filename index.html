<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style id="fouc-guard">body { visibility: hidden }</style>
  <title>Cardfight!! Vanguard Collection Manager v0.1.0</title>
</head>
<body>
  <div class="startup-progress-track">
    <div id="startupProgress" class="startup-progress-bar"></div>
  </div>
  <div class="app">
    <header>
      <!-- Mobile: active tab name -->
      <span id="mobileHeaderTitle" class="header-mobile-title">Collection</span>
      <!-- Desktop: full app name -->
      <h1 class="header-app-title">Cardfight!! Vanguard Collection Manager</h1>
      <span id="updateSpinner" class="update-spinner" hidden>↻ Checking for updates…</span>
      <button id="regionBtn" type="button" class="region-btn" title="Change region" aria-label="Change region">—</button>
      <button id="regionSwitchBtn" type="button" class="region-btn" title="Switch active region" aria-label="Switch active region" hidden>—</button>
      <button id="themeToggleBtn" type="button" class="theme-toggle-btn" title="Toggle dark/light mode" aria-label="Toggle dark/light mode">☀︎</button>
      <button id="aboutBtn" type="button" class="about-btn" title="About" aria-label="About">?</button>
    </header>

    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn is-active" data-tab="collection" type="button">Collection</button>
      <button class="tab-btn" data-tab="wishlist" type="button">Wishlist</button>
      <button class="tab-btn" data-tab="browse" type="button">Browse</button>
    </nav>

    <!-- ── Collection tab ──────────────────────────────────────────── -->
    <div id="tabCollection" class="tab-panel">
      <div id="collectionStats" class="collection-stats"></div>

      <div class="collection-toolbar">
        <div class="toolbar-row">
          <input type="search" id="collectionSearch"
                 placeholder="Search name, code, location…" autocomplete="off">
          <div class="collection-toolbar-actions">
            <button id="manageLocationsBtn" type="button" class="btn-secondary btn-sm">Locations</button>
            <button id="collectionViewToggle" type="button" class="btn-secondary btn-sm" aria-label="Toggle list/grid view">⊞ Grid</button>
            <button id="exportBtn" type="button" class="btn-secondary btn-sm">Export</button>
            <button id="importBtn" type="button" class="btn-secondary btn-sm">Import</button>
          </div>
        </div>
        <div class="toolbar-row toolbar-filters">
          <select id="collectionSort" class="filter-select">
            <option value="loc-code">Location A–Z</option>
            <option value="name">Name A–Z</option>
            <option value="code" selected>Code A–Z</option>
            <option value="qty-desc">Qty (most first)</option>
            <option value="id-desc">Date added (newest)</option>
          </select>
          <select id="collectionLocFilter" class="filter-select">
            <option value="all">All locations</option>
          </select>
          <select id="collectionNationFilter" class="filter-select">
            <option value="all">All nations</option>
          </select>
          <select id="collectionTypeFilter" class="filter-select">
            <option value="all">All types</option>
          </select>
          <button id="collectionGroupToggle" type="button" class="btn-secondary btn-sm" aria-label="Toggle grouped view">≡ Grouped</button>
        </div>
      </div>

      <div id="collectionListMeta" class="list-meta collectionListMeta">— entries</div>

      <div class="browse-layout">
        <div id="collectionListContainer" class="card-list-container"></div>
        <aside id="collectionPreviewPane" class="preview-pane">
          <div class="preview-inner">
            <div class="preview-header">
              <span class="preview-header-title">Card Details</span>
              <button id="collectionPreviewClose" class="btn-preview-close" type="button" aria-label="Close">✕</button>
            </div>
            <div id="collectionPreviewBody" class="preview-body"></div>
          </div>
        </aside>
      </div>
    </div>

    <!-- ── Wishlist tab ─────────────────────────────────────────────── -->
    <div id="tabWishlist" class="tab-panel tab-panel--hidden">
      <div id="wishlistStats" class="collection-stats"></div>

      <div class="collection-toolbar">
        <div class="toolbar-row">
          <input type="search" id="wishlistSearch"
                 placeholder="Search name, code…" autocomplete="off">
          <button id="wishlistViewToggle" type="button" class="btn-secondary btn-sm" aria-label="Toggle list/grid view">⊞ Grid</button>
        </div>
        <div class="toolbar-row toolbar-filters">
          <select id="wishlistSort" class="filter-select">
            <option value="name">Name A–Z</option>
            <option value="code" selected>Code A–Z</option>
            <option value="nation">Nation A–Z</option>
          </select>
          <select id="wishlistNationFilter" class="filter-select">
            <option value="all">All nations</option>
          </select>
          <select id="wishlistTypeFilter" class="filter-select">
            <option value="all">All types</option>
          </select>
        </div>
      </div>

      <div class="browse-layout">
        <div id="wishlistListContainer" class="card-list-container"></div>
        <aside id="wishlistPreviewPane" class="preview-pane">
          <div class="preview-inner">
            <div class="preview-header">
              <span class="preview-header-title">Card Details</span>
              <button id="wishlistPreviewClose" class="btn-preview-close" type="button" aria-label="Close">✕</button>
            </div>
            <div id="wishlistPreviewBody" class="preview-body"></div>
          </div>
        </aside>
      </div>
    </div>

    <!-- ── Browse tab ──────────────────────────────────────────────── -->
    <div id="tabBrowse" class="tab-panel tab-panel--hidden">
      <div class="actions">
        <button id="refreshBtn" type="button" class="btn-secondary">Force Refresh</button>
        <button id="clearBtn" type="button" class="btn-danger">Clear Cache</button>
        <button id="clearImageCacheBtn" type="button" class="btn-secondary">Image Cache ▾</button>
      </div>

      <div id="status" class="status status-info"></div>
      <div id="cacheInfo" class="cache-info"></div>
      <div id="stats" class="stats"></div>

      <div class="list-section">
        <div class="list-header">
          <h3>Browse Cards</h3>
          <div id="listMeta" class="list-meta">— cards</div>
        </div>

        <div id="filterBar" class="filter-bar">
          <input type="search" id="searchInput"
                 placeholder="Search name, code, race, clan, nation…" autocomplete="off">
          <button id="filterExpandBtn" type="button" class="filter-expand-btn" aria-label="Show/hide filters" aria-expanded="false">⊟ Filter</button>
          <div id="filterDropdowns" class="filter-dropdowns">
            <select id="setFilter"><option value="all">All sets</option></select>
            <select id="nationFilter"><option value="all">All nations</option></select>
            <select id="unitTypeFilter"><option value="all">All types</option></select>
            <select id="triggerFilter"><option value="all">All triggers</option></select>
            <select id="browseSort" class="filter-select">
              <option value="name">Name A–Z</option>
              <option value="code" selected>Code A–Z</option>
              <option value="grade-asc">Grade 0→4</option>
              <option value="grade-desc">Grade 4→0</option>
              <option value="owned-desc">Owned (most)</option>
            </select>
          </div>
          <button id="browseViewToggle" type="button" class="btn-secondary btn-sm" aria-label="Toggle list/grid view">⊞ Grid</button>
          <button id="clearFiltersBtn" type="button" class="btn-clear-filters" aria-label="Clear all filters">✕ Clear</button>
        </div>

        <div class="browse-layout">
          <div id="cardListContainer" class="card-list-container"></div>
          <aside id="previewPane" class="preview-pane">
            <div class="preview-inner">
              <div class="preview-header">
                <span class="preview-header-title">Card Details</span>
                <button id="previewClose" class="btn-preview-close" type="button" aria-label="Close">✕</button>
              </div>
              <div id="previewBody" class="preview-body"></div>
            </div>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Bottom navigation (mobile) ───────────────────────────────── -->
  <nav id="bottomNav" class="bottom-nav">
    <button class="bottom-nav-btn is-active" data-tab="collection" type="button">
      <span class="bottom-nav-icon">📦</span>
      <span class="bottom-nav-label">Collection</span>
    </button>
    <button class="bottom-nav-btn" data-tab="wishlist" type="button">
      <span class="bottom-nav-icon">❤️</span>
      <span class="bottom-nav-label">Wishlist</span>
    </button>
    <button class="bottom-nav-btn" data-tab="browse" type="button">
      <span class="bottom-nav-icon">🔍</span>
      <span class="bottom-nav-label">Browse</span>
    </button>
  </nav>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
